<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop | Kerala Traditional Clothing Store</title>
  <meta name="description" content="Browse premium Kerala handloom clothing. Add to cart and order via WhatsApp.">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- Custom Design System -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- Sticky Navbar -->
  <header id="site-header"></header>

  <!-- Main Content -->
  <main class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="mb-0">Shop</h2>
      <div class="d-flex gap-2 align-items-center">
        <select id="sortSelect" class="form-select form-select-sm" onchange="productModule.renderProducts()">
          <option value="default">Sort: Default</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating-desc">Rating</option>
        </select>
        <a href="cart.html" class="btn btn-outline-primary position-relative">
          <i class="bi bi-cart"></i> Cart
          <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
        </a>
      </div>
    </div>

    <!-- Filters -->
    <div class="mb-4">
      <button class="btn btn-outline-secondary btn-sm me-2" onclick="productModule.filterCategory('all')">All</button>
      <button class="btn btn-outline-secondary btn-sm me-2" onclick="productModule.filterCategory('mens')">Mens</button>
      <button class="btn btn-outline-secondary btn-sm me-2" onclick="productModule.filterCategory('womens')">Women</button>
      <button class="btn btn-outline-secondary btn-sm me-2" onclick="productModule.filterCategory('boys')">Boys</button>
      <button class="btn btn-outline-secondary btn-sm" onclick="productModule.filterCategory('girls')">Girls</button>
    </div>

    <!-- Product Grid -->
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="productGrid">
      <!-- JS injects product cards -->
    </div>

    <!-- Pagination -->
    <nav aria-label="Page navigation" class="mt-4">
      <ul class="pagination justify-content-center" id="pagination"></ul>
    </nav>
  </main>

  <!-- Footer -->
  <footer id="site-footer"></footer>

  <!-- Floating WhatsApp button -->
  <a href="#" id="whatsapp-float" class="whatsapp-float">
    <img src="assets/img/whatsapp-icon.svg" alt="WhatsApp" />
  </a>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="assets/js/utils.js"></script>
  <script type="module" src="assets/js/product.js"></script>
  <script type="module" src="assets/js/cart.js"></script>
  <script type="module" src="assets/js/whatsapp.js"></script>
  <script type="module" src="assets/js/navbar.js"></script>
</body>
</html>
